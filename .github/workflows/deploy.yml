name: Deploy Validator Site

on:
  push:
    branches: [main]
    paths: [validator-site/**]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: validator-site
      - run: npm run build
        working-directory: validator-site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: validator-site/dist
      - uses: actions/deploy-pages@v4
        id: deployment
